name: deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

concurrency:
  group: deploy-docs
  cancel-in-progress: true

env:
  # Read @shuttering/error-pages (and its @shuttering/tokens dep) from GitHub
  # Packages (see .npmrc). A PAT with read:packages on the shuttering org,
  # stored as a repo/org Actions secret. @shuttering/starlight still comes from
  # npmjs (pinned in pnpm.overrides), so npmjs stays the default registry.
  NODE_AUTH_TOKEN: ${{ secrets.SHUTTERING_NPM_TOKEN }}

jobs:
  deploy:
    runs-on: ubuntu-latest
    # Dormant until the docs infra is applied and the deploy role ARN is set as a
    # repository variable (see the docs.nanohype.dev OpenTofu component).
    if: ${{ vars.AWS_DEPLOY_ROLE_ARN != '' }}
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_DEPLOY_ROLE_ARN }}
          aws-region: us-east-1

      - name: Sync and invalidate
        env:
          BUCKET: nanohype-docs-site
          DISTRIBUTION_ID: ${{ vars.DOCS_DISTRIBUTION_ID }}
        run: |
          aws s3 sync dist/ "s3://$BUCKET/" --delete
          aws cloudfront create-invalidation --distribution-id "$DISTRIBUTION_ID" --paths '/*'
